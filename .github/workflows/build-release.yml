name: Build and Release SuperStarTrail

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.1)"
        required: true

jobs:
  # ══════════════════════════════════════════════════════════
  # Job 1 – Windows x64
  # ══════════════════════════════════════════════════════════
  build-windows:
    name: "🪟 Build Windows x64"
    runs-on: windows-latest
    permissions:
      contents: read

    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag:     ${{ steps.meta.outputs.tag }}
      asset:   ${{ steps.package.outputs.asset }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-lock.txt

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        env:
          EVENT_NAME:    ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME:      ${{ github.ref_name }}
        run: |
          if ($env:EVENT_NAME -eq "workflow_dispatch") {
            $raw = $env:INPUT_VERSION
          } else {
            $raw = $env:REF_NAME
          }
          if (-not $raw) { throw "Release version is required." }
          $version = if ($raw.StartsWith("v")) { $raw.Substring(1) } else { $raw }
          $tag = "v$version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag"         >> $env:GITHUB_OUTPUT
          Write-Host "Building version=$version  tag=$tag"

      - name: Validate APP_VERSION in source
        shell: pwsh
        env:
          EXPECTED: ${{ steps.meta.outputs.version }}
        run: |
          $actual = python -c "import sys; from pathlib import Path; sys.path.insert(0, str(Path('src').resolve())); from utils.settings import APP_VERSION; print(APP_VERSION)"
          if ($actual -ne $env:EXPECTED) {
            throw "Source APP_VERSION='$actual' != expected '$env:EXPECTED'. Update utils/settings.py before tagging."
          }
          Write-Host "APP_VERSION check passed: $actual"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt pyinstaller pytest

      - name: Run unit tests
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest -q `
            tests/test_file_naming.py `
            tests/test_settings.py `
            --tb=short

      - name: Build Windows executable
        shell: pwsh
        run: |
          pyinstaller SuperStarTrail-Windows.spec --clean --noconfirm

      - name: Verify build output
        shell: pwsh
        run: |
          $exe = "dist\SuperStarTrail.exe"
          if (-not (Test-Path $exe)) {
            Get-ChildItem dist -Recurse | Select-Object FullName
            throw "Expected exe not found: $exe"
          }
          $size = (Get-Item $exe).Length / 1MB
          Write-Host "Build OK: $exe  ($([math]::Round($size,1)) MB)"

      - name: Package release ZIP
        id: package
        shell: pwsh
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          $name = "SuperStarTrail-v$env:VERSION-win64.zip"
          $dest = "dist\$name"
          $files = @("dist\SuperStarTrail.exe")
          Compress-Archive -Path $files -DestinationPath $dest -Force
          $size = (Get-Item $dest).Length / 1MB
          Write-Host "ZIP created: $dest  ($([math]::Round($size,1)) MB)"
          "asset=$dest" >> $env:GITHUB_OUTPUT

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: ${{ steps.package.outputs.asset }}
          if-no-files-found: error
          retention-days: 7

  # ══════════════════════════════════════════════════════════
  # Job 2 – 创建 GitHub Release
  # ══════════════════════════════════════════════════════════
  release:
    name: "🚀 Create GitHub Release"
    runs-on: ubuntu-latest
    needs:
      - build-windows
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        env:
          EVENT_NAME:    ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME:      ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            RAW="$INPUT_VERSION"
          else
            RAW="$REF_NAME"
          fi
          [ -z "$RAW" ] && { echo "Release version is required." >&2; exit 1; }
          VERSION="${RAW#v}"
          TAG="v$VERSION"
          echo "tag=$TAG"                 >> "$GITHUB_OUTPUT"
          echo "name=SuperStarTrail $TAG" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_assets

      - name: Flatten assets into one directory
        run: |
          mkdir -p release_files
          find release_assets -maxdepth 2 -type f -exec cp {} release_files/ \;
          echo "── Files to publish ──"
          ls -lah release_files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.meta.outputs.tag }}
          name:       ${{ steps.meta.outputs.name }}
          draft:      false
          prerelease: false
          files:      release_files/*
          body: |
            ## SuperStarTrail ${{ steps.meta.outputs.tag }}

            ### 下载 / Downloads

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | 🪟 Windows x64 | `SuperStarTrail-${{ steps.meta.outputs.tag }}-win64.zip` | 解压后直接运行 exe |

            ---
            Built automatically by GitHub Actions.
