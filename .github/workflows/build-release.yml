name: Build and Release SuperStarTrail

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.1)"
        required: true

jobs:
  # ══════════════════════════════════════════════════════════
  # Job 1 – Windows x64
  # ══════════════════════════════════════════════════════════
  build-windows:
    name: "🪟 Build Windows x64"
    runs-on: windows-latest
    permissions:
      contents: read

    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag:     ${{ steps.meta.outputs.tag }}
      asset:   ${{ steps.package.outputs.asset }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-lock.txt

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        env:
          EVENT_NAME:    ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME:      ${{ github.ref_name }}
        run: |
          if ($env:EVENT_NAME -eq "workflow_dispatch") {
            $raw = $env:INPUT_VERSION
          } else {
            $raw = $env:REF_NAME
          }
          if (-not $raw) { throw "Release version is required." }
          $version = if ($raw.StartsWith("v")) { $raw.Substring(1) } else { $raw }
          $tag = "v$version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag"         >> $env:GITHUB_OUTPUT
          Write-Host "Building version=$version  tag=$tag"

      - name: Validate APP_VERSION in source
        shell: pwsh
        env:
          EXPECTED: ${{ steps.meta.outputs.version }}
        run: |
          $actual = python -c "import sys; from pathlib import Path; sys.path.insert(0, str(Path('src').resolve())); from utils.settings import APP_VERSION; print(APP_VERSION)"
          if ($actual -ne $env:EXPECTED) {
            throw "Source APP_VERSION='$actual' != expected '$env:EXPECTED'. Update utils/settings.py before tagging."
          }
          Write-Host "APP_VERSION check passed: $actual"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt pyinstaller pytest

      - name: Run unit tests
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest -q `
            tests/test_file_naming.py `
            tests/test_settings.py `
            --tb=short

      - name: Build Windows executable
        shell: pwsh
        run: |
          pyinstaller SuperStarTrail-Windows.spec --clean --noconfirm

      - name: Verify build output
        shell: pwsh
        run: |
          $exe = "dist\SuperStarTrail.exe"
          if (-not (Test-Path $exe)) {
            Get-ChildItem dist -Recurse | Select-Object FullName
            throw "Expected exe not found: $exe"
          }
          $size = (Get-Item $exe).Length / 1MB
          Write-Host "Build OK: $exe  ($([math]::Round($size,1)) MB)"

      - name: Package release ZIP
        id: package
        shell: pwsh
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          $name = "SuperStarTrail-v$env:VERSION-win64.zip"
          $dest = "dist\$name"
          $files = @("dist\SuperStarTrail.exe")
          Compress-Archive -Path $files -DestinationPath $dest -Force
          $size = (Get-Item $dest).Length / 1MB
          Write-Host "ZIP created: $dest  ($([math]::Round($size,1)) MB)"
          "asset=$dest" >> $env:GITHUB_OUTPUT

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: ${{ steps.package.outputs.asset }}
          if-no-files-found: error
          retention-days: 7

  # ══════════════════════════════════════════════════════════
  # Job 2 – macOS arm64
  # ══════════════════════════════════════════════════════════
  build-macos:
    name: "🍎 Build macOS arm64"
    runs-on: macos-latest
    permissions:
      contents: read

    # 把 secrets 映射为 job-level 环境变量，供 step-level if 条件检测
    env:
      APPLE_CERT_BASE64:   ${{ secrets.APPLE_CERT_BASE64 }}
      APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
      SIGNING_IDENTITY:    ${{ secrets.SIGNING_IDENTITY }}
      APPLE_ID:            ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD:  ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID:       ${{ secrets.APPLE_TEAM_ID }}

    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag:     ${{ steps.meta.outputs.tag }}
      asset:   ${{ steps.package.outputs.asset }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-lock.txt

      - name: Resolve release metadata
        id: meta
        env:
          EVENT_NAME:    ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME:      ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            RAW="$INPUT_VERSION"
          else
            RAW="$REF_NAME"
          fi
          [ -z "$RAW" ] && { echo "Release version is required." >&2; exit 1; }
          VERSION="${RAW#v}"
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "Building version=$VERSION  tag=$TAG"

      - name: Validate APP_VERSION in source
        env:
          EXPECTED: ${{ steps.meta.outputs.version }}
        run: |
          ACTUAL=$(python -c "import sys; from pathlib import Path; sys.path.insert(0, str(Path('src').resolve())); from utils.settings import APP_VERSION; print(APP_VERSION)")
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "Source APP_VERSION='$ACTUAL' != expected '$EXPECTED'. Update utils/settings.py before tagging." >&2
            exit 1
          fi
          echo "APP_VERSION check passed: $ACTUAL"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt pyinstaller pytest

      - name: Run unit tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest -q \
            tests/test_file_naming.py \
            tests/test_settings.py \
            --tb=short

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build macOS .app bundle
        run: |
          pyinstaller SuperStarTrail.spec --clean --noconfirm
          if [ ! -d "dist/SuperStarTrail.app" ]; then
            echo "Build failed: dist/SuperStarTrail.app not found" >&2
            find dist -type f | head -30
            exit 1
          fi
          echo "Build OK: dist/SuperStarTrail.app"

      # ── 代码签名（可选，需在 GitHub 仓库 Settings → Secrets 中配置）─────────
      # APPLE_CERT_BASE64     : base64 编码的 .p12 证书（base64 -i YourCert.p12）
      # APPLE_CERT_PASSWORD   : .p12 证书导出密码
      # SIGNING_IDENTITY      : 例如 "Developer ID Application: Your Name (TEAMID)"
      # ─────────────────────────────────────────────────────────────────────────
      - name: Import signing certificate
        if: ${{ env.APPLE_CERT_BASE64 != '' }}
        env:
          APPLE_CERT_BASE64:   ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PWD="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERT_BASE64" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERT_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          echo "Certificate imported successfully"

      - name: Code sign .app bundle
        if: ${{ env.SIGNING_IDENTITY != '' }}
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          # 先逐一签名所有 .dylib / .so / 可执行文件
          find dist/SuperStarTrail.app/Contents -type f \
            \( -name "*.dylib" -o -name "*.so" -o -perm -111 \) -print0 | \
            xargs -0 -I {} codesign --force --sign "$SIGNING_IDENTITY" \
              --timestamp --options runtime "{}"
          # 签名 .app 主包
          codesign --force --sign "$SIGNING_IDENTITY" \
            --options runtime \
            --timestamp \
            --entitlements entitlements.plist \
            dist/SuperStarTrail.app
          codesign --verify --deep --strict --verbose=2 dist/SuperStarTrail.app
          echo "Code signing complete"

      - name: Create DMG
        id: package
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          DMG_NAME="SuperStarTrail-v${VERSION}-arm64.dmg"
          mkdir -p tmp_dmg
          cp -R dist/SuperStarTrail.app tmp_dmg/
          [ -f DMG_README.txt ] && cp DMG_README.txt tmp_dmg/README.txt

          create-dmg \
            --volname "SuperStarTrail ${VERSION}" \
            --window-pos 200 120 \
            --window-size 580 380 \
            --icon-size 100 \
            --icon "SuperStarTrail.app" 140 180 \
            --hide-extension "SuperStarTrail.app" \
            --app-drop-link 440 180 \
            --no-internet-enable \
            "dist/${DMG_NAME}" \
            tmp_dmg \
          || {
            echo "create-dmg failed, falling back to hdiutil"
            ln -sf /Applications tmp_dmg/Applications
            hdiutil create -volname "SuperStarTrail" \
              -srcfolder tmp_dmg -ov -format UDZO "dist/${DMG_NAME}"
          }

          rm -rf tmp_dmg
          SIZE=$(du -sh "dist/${DMG_NAME}" | cut -f1)
          echo "DMG created: dist/${DMG_NAME}  (${SIZE})"
          echo "asset=dist/${DMG_NAME}" >> "$GITHUB_OUTPUT"

      # ── 公证 + 装订（可选，需额外配置 Secrets）──────────────────────────────
      # APPLE_ID           : Apple 开发者账号邮箱
      # APPLE_APP_PASSWORD : App 专用密码（非账号密码，在 appleid.apple.com 生成）
      # APPLE_TEAM_ID      : 10 位 Team ID
      # ─────────────────────────────────────────────────────────────────────────
      - name: Notarize and staple DMG
        if: ${{ env.APPLE_ID != '' && env.APPLE_APP_PASSWORD != '' && env.APPLE_TEAM_ID != '' }}
        env:
          APPLE_ID:           ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID:      ${{ secrets.APPLE_TEAM_ID }}
          VERSION:            ${{ steps.meta.outputs.version }}
        run: |
          DMG_NAME="SuperStarTrail-v${VERSION}-arm64.dmg"
          echo "Submitting dist/${DMG_NAME} for notarization..."
          xcrun notarytool submit "dist/${DMG_NAME}" \
            --apple-id  "$APPLE_ID" \
            --password  "$APPLE_APP_PASSWORD" \
            --team-id   "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "dist/${DMG_NAME}"
          xcrun stapler validate "dist/${DMG_NAME}"
          echo "Notarization and stapling complete"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: ${{ steps.package.outputs.asset }}
          if-no-files-found: error
          retention-days: 7

  # ══════════════════════════════════════════════════════════
  # Job 3 – 创建 GitHub Release
  # ══════════════════════════════════════════════════════════
  release:
    name: "🚀 Create GitHub Release"
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        env:
          EVENT_NAME:    ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME:      ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            RAW="$INPUT_VERSION"
          else
            RAW="$REF_NAME"
          fi
          [ -z "$RAW" ] && { echo "Release version is required." >&2; exit 1; }
          VERSION="${RAW#v}"
          TAG="v$VERSION"
          echo "tag=$TAG"                 >> "$GITHUB_OUTPUT"
          echo "name=SuperStarTrail $TAG" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_assets

      - name: Flatten assets into one directory
        run: |
          mkdir -p release_files
          find release_assets -maxdepth 2 -type f -exec cp {} release_files/ \;
          echo "── Files to publish ──"
          ls -lah release_files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.meta.outputs.tag }}
          name:       ${{ steps.meta.outputs.name }}
          draft:      false
          prerelease: false
          files:      release_files/*
          body: |
            ## SuperStarTrail ${{ steps.meta.outputs.tag }}

            ### 下载 / Downloads

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | 🪟 Windows x64 | `SuperStarTrail-${{ steps.meta.outputs.tag }}-win64.zip` | 解压后直接运行 exe |
            | 🍎 macOS arm64 | `SuperStarTrail-${{ steps.meta.outputs.tag }}-arm64.dmg` | 打开 DMG 拖入应用程序文件夹 |

            ---
            Built automatically by GitHub Actions.
